<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特設ページ</title>
    <style>
        /* 元のデザインのスタイルシート */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 0;
            color: #333;
            line-height: 1.6;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            text-align: center;
            padding: 60px 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 1px;
        }
        .header p {
            margin: 15px 0 0 0;
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .main-content {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 40px;
            margin-bottom: 40px;
        }
        .section-title {
            font-size: 1.8rem;
            color: #1e3c72;
            border-bottom: 2px solid #1e3c72;
            padding-bottom: 10px;
            margin-top: 0;
            margin-bottom: 30px;
            text-align: center;
        }
        .preview-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
            align-items: center;
            margin-top: 20px;
        }
        .preview-box {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }
        .preview-label {
            font-size: 1.1rem;
            font-weight: bold;
            color: #555;
            margin-bottom: 12px;
            display: block;
        }
        .preview-image {
            width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px solid #e1e8ed;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        .preview-image:hover {
            transform: scale(1.01);
        }
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: #777;
            font-size: 0.9rem;
            border-top: 1px solid #e1e8ed;
            background-color: #fff;
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 2rem; }
            .main-content { padding: 25px; }
            .section-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>SPECIAL PREVIEW</h1>
        <p>特設公開ページ</p>
    </header>

    <div class="container">
        <main class="main-content">
            <h2 class="section-title">プレビュー確認</h2>
            
            <div class="preview-container">
                <div class="preview-box">
                    <span class="preview-label">【 プレビュー #01 】</span>
                    <img src="preview01.png" alt="PREVIEW #01" class="preview-img">
                </div>

                <div class="preview-box">
                    <span class="preview-label">【 プレビュー #02 】</span>
                    <img src="preview02.png" alt="PREVIEW #02" class="preview-img">
                </div>
            </div>
        </main>
    </div>

    <footer class="footer">
        &copy; 2026 特設ページ All Rights Reserved.
    </footer>

</body>
</html>
